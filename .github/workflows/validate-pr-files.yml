name: Validate PR - Protected Files Check

on:
  pull_request:
    paths:
      - 'runways.json'
      - 'sectors.json'
      - 'stations.json'

jobs:
  check-protected-files:
    name: Check for Protected File Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write

    steps:
      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const protectedFiles = ['runways.json', 'sectors.json', 'stations.json'];

            const violations = files
              .map(f => f.filename)
              .filter(filename =>
                protectedFiles.some(p => filename === p || filename.endsWith('/' + p))
              );

            core.setOutput('violations', violations.join(', '));
            core.setOutput('has_violations', violations.length > 0 ? 'true' : 'false');

      - name: Post PR comment
        if: steps.changed-files.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const violations = '${{ steps.changed-files.outputs.violations }}';
            const fileList = violations.split(', ').map(f => `- \`${f}\``).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ❌ Pull Request Invalid

            This pull request modifies one or more **protected files** and cannot be merged directly.

            **Protected files changed:**
            ${fileList}

            ### Why are these files protected?
            The following files are managed centrally and must not be modified via pull request:
            - \`runways.json\`
            - \`sectors.json\`
            - \`stations.json\`

            ### What should you do?
            1. Remove the changes to the protected files from this PR.
            2. If you believe these files need to be updated, please contact the repository maintainers directly.
            3. Once the protected files are removed from this PR, the check will re-run automatically.

            ---
            *This check was triggered automatically by the **Protected Files** workflow.*`
            });

      - name: Fail the check
        if: steps.changed-files.outputs.has_violations == 'true'
        run: |
          echo "❌ This PR modifies protected files: ${{ steps.changed-files.outputs.violations }}"
          echo "Please remove changes to these files and re-push."
          exit 1

      - name: Pass the check
        if: steps.changed-files.outputs.has_violations != 'true'
        run: |
          echo "✅ No protected files modified. PR is valid."
