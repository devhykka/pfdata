name: Auto-generate runways.json (PR)

on:
  pull_request_target:
    branches: [ main ]
    paths:
      - ".data/runways/**"
      - ".github/workflows/concatenate_runways.py"

concurrency:
  group: runways-build-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. Block direct edits to protected output files ───────────────────────────
  check-protected-files:
    name: Check for Protected File Changes
    runs-on: ubuntu-latest
    steps:
      - name: Check PR does not touch protected files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch all commits in the PR (paginate to handle long histories)
            let allCommits = [];
            let page = 1;
            while (true) {{
              const {{ data: batch }} = await github.rest.pulls.listCommits({{
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
                page,
              }});
              allCommits = allCommits.concat(batch);
              if (batch.length < 100) break;
              page++;
            }}

            // For each protected file, find the LAST commit that touched it
            // and fail only if that commit was by a human (not the bot).
            const protectedFiles = ['runways.json'];
            const violations = [];
            for (const protectedFile of protectedFiles) {{
              for (const commit of [...allCommits].reverse()) {{
                const {{ data: commitData }} = await github.rest.repos.getCommit({{
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: commit.sha,
                }});
                const touchesFile = (commitData.files ?? []).some(f =>
                  f.filename === protectedFile || f.filename.endsWith('/' + protectedFile)
                );
                if (touchesFile) {{
                  const author = commit.author?.login ?? '';
                  if (author !== 'github-actions[bot]') {
                    core.info('❌ ' + protectedFile + ' was last modified by human: ' + author);
                    violations.push(protectedFile);
                  } else {
                    core.info('✅ ' + protectedFile + ' was last modified by github-actions[bot] — OK.');
                  }
                  break;
                }}
              }}
            }}

            core.setOutput('violations', violations.join(', '));
            core.setOutput('has_violations', violations.length > 0 ? 'true' : 'false');

      - name: Post PR comment on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ❌ Pull Request Invalid
            This pull request directly modifies \`runways.json\`, which is a protected file and cannot be edited via pull request.
            ### Why is this file protected?
            \`runways.json\` is auto-generated by the build workflow from the individual files in \`.data/runways/\`. Manual edits will be overwritten.
            ### What should you do?
            1. Remove \`runways.json\` from this PR.
            2. Make your changes to the relevant file(s) inside \`.data/runways/\` instead.
            3. The build workflow will regenerate \`runways.json\` automatically.
            ---
            *This check was triggered automatically by the **Auto-generate runways.json** workflow.*`
            });

      - name: Fail on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        run: |
          echo "❌ This PR modifies protected files: ${{ steps.changed-files.outputs.violations }}"
          exit 1

      - name: Pass
        if: steps.changed-files.outputs.has_violations != 'true'
        run: echo "✅ No protected files modified. PR is valid."

  # ── 2. Validate runway filenames BEFORE building ──────────────────────────────
  validate:
    name: Validate Runway Filenames
    runs-on: ubuntu-latest
    needs: check-protected-files
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Check filenames against approved list
        shell: bash
        run: |
          # ---------------------------------------------------------------
          # APPROVED AIRPORT CODES
          # Add or remove ICAO codes here as needed (filenames are <CODE>.json)
          # ---------------------------------------------------------------
          APPROVED_CODES=(
            EFKT
            EGFF
            EGLC
            EGHI
            EGKK
            GCLP
            LCLK
            LCPH
            LCRA
            LEMH
            MDAB
            MDCR
            MDPC
            MDST
            MTCA
            LPMA
            PANC
            PAFA
          )
          # ---------------------------------------------------------------

          RUNWAY_DIR=".data/runways"
          FAILED=0

          declare -A APPROVED_MAP
          for code in "${APPROVED_CODES[@]}"; do
            APPROVED_MAP["${code}.json"]=1
          done

          if [ ! -d "$RUNWAY_DIR" ]; then
            echo "::warning::Directory '$RUNWAY_DIR' does not exist — nothing to validate."
            exit 0
          fi

          echo "Scanning '$RUNWAY_DIR' for unexpected files..."
          echo ""

          while IFS= read -r -d '' filepath; do
            filename=$(basename "$filepath")

            if [[ "$filename" != *.json ]]; then
              echo "::error file=$filepath::❌  '$filename' is not a .json file."
              FAILED=1
              continue
            fi

            if [[ -z "${APPROVED_MAP[$filename]+_}" ]]; then
              echo "::error file=$filepath::❌  '$filename' is not in the approved runway file list."
              FAILED=1
            else
              echo "✅  '$filename' — approved."
            fi
          done < <(find "$RUNWAY_DIR" -maxdepth 1 -type f -print0 | sort -z)

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more runway files failed validation."
            echo ""
            echo "Approved filenames:"
            for code in "${APPROVED_CODES[@]}"; do
              echo "  • ${code}.json"
            done
            exit 1
          fi

          echo "All runway files passed validation."

  # ── 3. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build runways.json
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Concatenate and clean files
        run: python .github/workflows/concatenate_runways.py

      - name: Commit changes (if any) and push back to PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runways.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update runways.json"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Upload cleaned files
          path: runways.json

  # ── 4. Re-validate AFTER the bot commit ──────────────────────────────────────
  post-build-validate:
    name: Post-build Filename Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout PR branch (latest, including bot commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Re-check filenames against approved list
        shell: bash
        run: |
          # ---------------------------------------------------------------
          # APPROVED AIRPORT CODES  (keep in sync with the validate job above)
          # ---------------------------------------------------------------
          APPROVED_CODES=(
            EFKT
            EGFF
            EGLC
            EGHI
            EGKK
            GCLP
            LCLK
            LCPH
            LCRA
            LEMH
            MDAB
            MDCR
            MDPC
            MDST
            MTCA
            LPMA
            PANC
            PAFA
          )
          # ---------------------------------------------------------------

          RUNWAY_DIR=".data/runways"
          FAILED=0

          declare -A APPROVED_MAP
          for code in "${APPROVED_CODES[@]}"; do
            APPROVED_MAP["${code}.json"]=1
          done

          if [ ! -d "$RUNWAY_DIR" ]; then
            echo "::warning::Directory '$RUNWAY_DIR' does not exist — nothing to validate."
            exit 0
          fi

          echo "Post-build scan of '$RUNWAY_DIR'..."
          echo ""

          while IFS= read -r -d '' filepath; do
            filename=$(basename "$filepath")

            if [[ "$filename" != *.json ]]; then
              echo "::error file=$filepath::❌  '$filename' is not a .json file."
              FAILED=1
              continue
            fi

            if [[ -z "${APPROVED_MAP[$filename]+_}" ]]; then
              echo "::error file=$filepath::❌  '$filename' is not in the approved runway file list."
              FAILED=1
            else
              echo "✅  '$filename' — approved."
            fi
          done < <(find "$RUNWAY_DIR" -maxdepth 1 -type f -print0 | sort -z)

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Post-build validation failed — unapproved files still present."
            exit 1
          fi

          echo "Post-build validation passed."
