name: Validate Runway Files

on:
  push:
    paths:
      - '.data/runways/**'
  pull_request:
    paths:
      - '.data/runways/**'

jobs:
  validate-runway-filenames:
    name: Check Runway Filenames
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate runway filenames
        shell: bash
        run: |
          # ---------------------------------------------------------------
          # APPROVED AIRPORT CODES
          # Add or remove ICAO codes here as needed (filenames are <CODE>.json)
          # ---------------------------------------------------------------
          APPROVED_CODES=(
            EFKT
            EGHI
            EGKK
            GCLP
            LCLK
            LCPH
            LCRA
            LEMH
            MDAB
            MDCR
            MDPC
            MDST
            MTCA
            LPMA
            PANC
            PAFA
          )
          # ---------------------------------------------------------------

          RUNWAY_DIR=".data/runways"
          FAILED=0

          # Build a quick lookup (associative array)
          declare -A APPROVED_MAP
          for code in "${APPROVED_CODES[@]}"; do
            APPROVED_MAP["${code}.json"]=1
          done

          # Check the directory exists
          if [ ! -d "$RUNWAY_DIR" ]; then
            echo "::warning::Directory '$RUNWAY_DIR' does not exist — nothing to validate."
            exit 0
          fi

          echo "Scanning '$RUNWAY_DIR' for unexpected files..."
          echo ""

          # Iterate over every file in the directory (non-recursive)
          while IFS= read -r -d '' filepath; do
            filename=$(basename "$filepath")

            # Enforce .json extension
            if [[ "$filename" != *.json ]]; then
              echo "::error file=$filepath::❌  '$filename' is not a .json file."
              FAILED=1
              continue
            fi

            # Check against approved list
            if [[ -z "${APPROVED_MAP[$filename]+_}" ]]; then
              echo "::error file=$filepath::❌  '$filename' is not in the approved runway file list."
              FAILED=1
            else
              echo "✅  '$filename' — approved."
            fi
          done < <(find "$RUNWAY_DIR" -maxdepth 1 -type f -print0 | sort -z)

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more runway files failed validation. See errors above."
            echo ""
            echo "Approved filenames:"
            for code in "${APPROVED_CODES[@]}"; do
              echo "  • ${code}.json"
            done
            exit 1
          fi

          echo "All runway files passed validation."
