name: Validate PR - Protected Files Check

on:
  pull_request:
    paths:
      - 'runways.json'
      - 'sectors.json'
      - 'stations.json'
      - 'waypoints.json'

jobs:
  check-protected-files:
    name: Check for Protected File Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check PR does not touch protected files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const protectedFiles = ['runways.json', 'sectors.json', 'stations.json', 'waypoints.json'];

            let allCommits = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
                page,
              });
              allCommits = allCommits.concat(batch);
              if (batch.length < 100) break;
              page++;
            }

            const violations = [];
            for (const protectedFile of protectedFiles) {
              for (const commit of [...allCommits].reverse()) {
                const { data: commitData } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: commit.sha,
                });
                const touches = (commitData.files ?? []).some(f =>
                  f.filename === protectedFile || f.filename.endsWith('/' + protectedFile)
                );
                if (touches) {
                  const author = commit.author ? commit.author.login : '';
                  if (author !== 'github-actions[bot]') {
                    core.info('Last commit touching ' + protectedFile + ' was by human: ' + author);
                    violations.push(protectedFile);
                  } else {
                    core.info('Last commit touching ' + protectedFile + ' was by bot — OK.');
                  }
                  break;
                }
              }
            }

            core.setOutput('violations', violations.join(', '));
            core.setOutput('has_violations', violations.length > 0 ? 'true' : 'false');

      - name: Post PR comment on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const violations = '${{ steps.changed-files.outputs.violations }}';
            const fileList = violations.split(', ').map(f => '- `' + f + '`').join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ❌ Pull Request Invalid
            This pull request directly modifies one or more protected files and cannot be merged directly.
            **Protected files changed:**
            ${fileList}
            ### Why are these files protected?
            These files are auto-generated by build workflows from the individual files in \`.data/\`. Manual edits will be overwritten.
            ### What should you do?
            1. Remove the protected file(s) from this PR.
            2. Make your changes inside the relevant \`.data/\` subfolder instead:
               - Runway changes → \`.data/runways/\`
               - Sector changes → \`.data/sectors/\`
               - Station changes → \`.data/stations/\`
               - Waypoint changes → \`.data/waypoints/\`
            3. The build workflow will regenerate the output file automatically.
            ---
            *This check was triggered automatically by the **Protected Files** workflow.*`
            });

      - name: Fail on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        run: |
          echo "❌ This PR modifies protected files: ${{ steps.changed-files.outputs.violations }}"
          exit 1

      - name: Pass
        if: steps.changed-files.outputs.has_violations != 'true'
        run: echo "✅ No protected files modified. PR is valid."
