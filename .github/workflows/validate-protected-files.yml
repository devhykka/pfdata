name: Validate PR - Protected Files Check

on:
  pull_request:
    paths:
      - 'runways.json'
      - 'sectors.json'
      - 'stations.json'
      - 'waypoints.json'

jobs:
  check-protected-files:
    name: Check for Protected File Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check PR does not touch protected files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const protectedFiles = ['runways.json', 'sectors.json', 'stations.json', 'waypoints.json'];

            // Get the files changed in this PR
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const changedProtected = prFiles
              .map(f => f.filename)
              .filter(filename =>
                protectedFiles.some(p => filename === p || filename.endsWith('/' + p))
              );

            // If no protected files are in the PR diff at all, pass immediately
            if (changedProtected.length === 0) {
              core.info('No protected files in PR diff — OK.');
              core.setOutput('violations', '');
              core.setOutput('has_violations', 'false');
              return;
            }

            // Protected files are in the diff — check who made the HEAD commit
            const headSha = context.payload.pull_request.head.sha;
            const { data: headCommit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const headAuthor = headCommit.author ? headCommit.author.login : '';
            core.info('HEAD commit author: ' + headAuthor);

            // If the HEAD commit is from the bot, the human change has been
            // superseded — pass.
            if (headAuthor === 'github-actions[bot]') {
              core.info('HEAD commit is from bot — protected file changes are bot-managed, OK.');
              core.setOutput('violations', '');
              core.setOutput('has_violations', 'false');
              return;
            }

            // HEAD commit is from a human and touches protected files — fail.
            core.setOutput('violations', changedProtected.join(', '));
            core.setOutput('has_violations', 'true');

      - name: Post PR comment on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const violations = '${{ steps.changed-files.outputs.violations }}';
            const fileList = violations.split(', ').map(f => '- `' + f + '`').join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ❌ Pull Request Invalid
            This pull request directly modifies one or more protected files and cannot be merged directly.
            **Protected files changed:**
            ${fileList}
            ### Why are these files protected?
            These files are auto-generated by build workflows from the individual files in \`.data/\`. Manual edits will be overwritten.
            ### What should you do?
            1. Remove the protected file(s) from this PR.
            2. Make your changes inside the relevant \`.data/\` subfolder instead:
               - Runway changes → \`.data/runways/\`
               - Sector changes → \`.data/sectors/\`
               - Station changes → \`.data/stations/\`
               - Waypoint changes → \`.data/waypoints/\`
            3. The build workflow will regenerate the output file automatically.
            ---
            *This check was triggered automatically by the **Protected Files** workflow.*`
            });

      - name: Fail on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        run: |
          echo "❌ This PR modifies protected files: ${{ steps.changed-files.outputs.violations }}"
          exit 1

      - name: Pass
        if: steps.changed-files.outputs.has_violations != 'true'
        run: echo "✅ No protected files modified. PR is valid."
