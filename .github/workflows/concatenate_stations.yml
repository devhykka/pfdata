name: Auto-generate stations.json (PR)

on:
  pull_request_target:
    branches: [ main ]
    paths:
      - ".data/stations/**"
      - ".github/workflows/concatenate_stations.py"

concurrency:
  group: stations-build-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. Block direct edits to protected output file ────────────────────────────
  check-protected-files:
    name: Check for Protected File Changes
    runs-on: ubuntu-latest
    steps:
      - name: Check PR does not touch protected files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const protectedFiles = ['stations.json'];
            const violations = files
              .map(f => f.filename)
              .filter(filename =>
                protectedFiles.some(p => filename === p || filename.endsWith('/' + p))
              );
            core.setOutput('violations', violations.join(', '));
            core.setOutput('has_violations', violations.length > 0 ? 'true' : 'false');

      - name: Post PR comment on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ❌ Pull Request Invalid
            This pull request directly modifies \`stations.json\`, which is a protected file and cannot be edited via pull request.
            ### Why is this file protected?
            \`stations.json\` is auto-generated by the build workflow from the individual files in \`.data/stations/\`. Manual edits will be overwritten.
            ### What should you do?
            1. Remove \`stations.json\` from this PR.
            2. Make your changes to the relevant file(s) inside \`.data/stations/\` instead.
            3. The build workflow will regenerate \`stations.json\` automatically.
            ---
            *This check was triggered automatically by the **Auto-generate stations.json** workflow.*`
            });

      - name: Fail on violation
        if: steps.changed-files.outputs.has_violations == 'true'
        run: |
          echo "❌ This PR modifies protected files: ${{ steps.changed-files.outputs.violations }}"
          exit 1

      - name: Pass
        if: steps.changed-files.outputs.has_violations != 'true'
        run: echo "✅ No protected files modified. PR is valid."

  # ── 2. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build stations.json
    runs-on: ubuntu-latest
    needs: check-protected-files
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Concatenate and clean files
        run: python .github/workflows/concatenate_stations.py

      - name: Commit changes (if any) and push back to PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stations.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update stations.json"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Upload cleaned files
          path: stations.json
